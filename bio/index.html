<!DOCTYPE html>
<html lang="pt-br" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Instituto Acari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #050505; }
        
        .text-glow {
            color: #f26522;
            text-shadow: 0 0 30px rgba(242, 101, 34, 0.4);
        }

        /* Animação suave para o 404 */
        @keyframes subtle-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }
        .animate-subtle { animation: subtle-float 8s ease-in-out infinite; }

        /* Ajuste para o vídeo branco não estourar no escuro */
        .video-mask {
            mix-blend-mode: screen; /* O segredo: faz o branco do vídeo brilhar sobre o preto */
            opacity: 0.15; /* Bem sutil para não cansar o olho */
        }
    </style>
</head>
<body class="h-full text-white overflow-hidden selection:bg-orange-500/30">

    <div class="fixed inset-0 z-0 bg-[#050505]">
        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-[#050505] z-10"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-[#050505] via-transparent to-[#050505] z-10"></div>
        
        <video autoplay muted loop playsinline class="w-full h-full object-cover video-mask">
            <source src="../video/fundo.mp4" type="video/mp4">
        </video>
    </div>

    <main class="relative z-20 flex flex-col items-center justify-center h-full px-6 text-center">
        
        <div class="animate-subtle mb-6">
            <h1 class="text-[12rem] md:text-[22rem] font-black leading-none tracking-tighter text-glow select-none">
                404
            </h1>
        </div>

        <div class="max-w-xl -mt-10 md:-mt-15 text-center">
            <h2 class="text-xl md:text-3xl font-bold uppercase tracking-[0.4em] text-white/90">
                Página Inexistente
            </h2>
            <p class="mt-6 text-sm md:text-base text-white/50 font-medium leading-relaxed max-w-md mx-auto">
                O endereço acessado não foi encontrado ou foi movido. 
                Retorne para a nossa plataforma institucional abaixo.
            </p>
        </div>

        <div class="mt-12 flex flex-col md:flex-row gap-6 w-full max-w-md justify-center">
            
            <a href="/" 
               class="group relative inline-flex items-center justify-center px-10 py-4 font-bold text-black transition-all duration-300 bg-[#f26522] rounded-full hover:bg-[#ff7a3d] hover:scale-105 active:scale-95">
                <span class="uppercase tracking-widest text-xs">Voltar ao Início</span>
            </a>

            <a href="/bio" 
               class="group relative inline-flex items-center justify-center px-10 py-4 font-bold text-white transition-all duration-300 border border-white/20 rounded-full hover:border-white hover:bg-white/5 overflow-hidden">
                <span class="uppercase tracking-widest text-xs">Links da Bio</span>
            </a>

        </div>

        <div class="absolute bottom-10 text-white/20 text-[10px] uppercase tracking-[0.5em]">
            Instituto Acari © 2026
        </div>

    </main>

</body>
</html>
