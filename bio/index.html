<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIO | Instituto Acari</title>
    
    <link rel="icon" href="../img/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'acari-blue': '#2196F3',
                        'acari-green': '#71C144',
                        'acari-red': '#E81C1D',
                        'acari-yellow': '#FDB80A',  
                        'acari-dark': '#000000',
                    },
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ESTE É O FUNDO QUE VAI SE MEXER */
        #bg-parallax {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 130%; /* Maior que a tela para ter espaço para deslizar */
            background-image: url('./img/fundo.png');
            background-size: cover;
            background-position: center;
            z-index: -1; /* Fica atrás de tudo */
            will-change: transform;
        }

        .alice-mask {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
    </style>
</head>
<body class="bg-gray-100 font-roboto text-acari-dark relative overflow-x-hidden">

    <div id="bg-parallax"></div>

    <div id="loader-bar" class="fixed top-0 left-0 h-[3px] bg-acari-blue transition-all duration-300 z-[100]" style="width: 0"></div>

    <div id="main-container" class="relative z-10 min-h-screen flex flex-col items-center py-20 px-4 transition-opacity duration-500">
    
        <div class="w-full max-w-[380px] bg-white rounded-[1.5rem] shadow-2xl text-center border border-white p-0 overflow-visible z-20 relative">
            
            <div class="relative inline-block -mt-12 mb-4">
                <div class="w-24 h-24 bg-white rounded-full border-2 border-gray-100 shadow-md overflow-hidden flex items-center justify-center">
                    <img src="./img/logo.png" alt="Logo" class="w-full h-full object-contain scale-[1.7] -translate-y-[-2%] translate-x-[4%]">
                </div>
            </div>
            
            <div class="px-8 pt-2 pb-0">
                <h1 class="text-4xl md:text-5xl font-poppins text-acari-dark mb-1">Instituto Acari</h1>
                <p class="text-gray-500 text-[10px] mb-8 font-poppins leading-tight uppercase tracking-[0.2em] mt-5">Acolhimento, Cuidado, Amor,<br> Respeito e Inclusão</p>
                
                <div class="flex justify-center gap-6">
                    <a href="#" class="social-link w-11 h-11 rounded-full bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white flex items-center justify-center text-xl transition-transform hover:scale-110">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="#" class="social-link w-11 h-11 rounded-full bg-[#25D366] text-white flex items-center justify-center text-xl shadow-md transition-transform hover:scale-110">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="#" class="social-link w-11 h-11 rounded-full bg-acari-blue text-white flex items-center justify-center text-lg shadow-md transition-transform hover:scale-110">
                        <i class="fas fa-envelope"></i>
                    </a>
                </div>
            </div>
    
            <a href="https://docs.google.com/forms/..." target="_blank" 
                class="nav-link group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-blue text-white rounded-2xl font-bold shadow-2xl transition-all hover:scale-[1.03] active:scale-95 relative z-40 max-w-[290px] translate-x-[45px] translate-y-[30px]">
                <div class="flex justify-center items-center">
                    <img src="./img/inscreva-se.png" alt="" class="w-16 h-16 object-contain brightness-0 invert">
                </div>
                <div class="text-left"><span class="text-[16px] tracking-widest uppercase font-black">inscreva-se</span></div>
            </a>

        </div>

        <div class="w-full max-w-[310px] space-y-4 mt-12 px-2">
            <a href="/#loja" class="nav-link group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-yellow text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02]">
                <div class="flex justify-center items-center"><img src="./img/loja.png" alt="" class="w-10 h-10 object-contain brightness-0 invert"></div>
                <div class="text-left uppercase font-black tracking-widest text-[15px]">Adquira<br>Nossa garrafa</div>
            </a>
            <a href="/#amigos" class="nav-link group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-green text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02]">
                <div class="flex justify-center items-center"><img src="./img/amigos.png" alt="" class="w-12 h-12 object-contain brightness-0 invert"></div>
                <div class="text-left"><div class="text-[16px] tracking-widest uppercase font-black">Amigos do Acari</div><div class="text-[10px] opacity-90 uppercase mt-1">Saiba como doar</div></div>
            </a>
            <a href="#" class="nav-link group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-red text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02]">
                <div class="flex justify-center items-center"><img src="./img/voluntario.png" alt="" class="w-14 h-14 object-contain brightness-0 invert"></div>
                <div class="text-left font-black tracking-widest uppercase text-[16px]">Seja um<br>voluntário</div>
            </a>
            <a href="#" class="nav-link group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-blue text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02]">
                <div class="flex justify-center items-center"><img src="./img/website.png" alt="" class="w-10 h-10 object-contain brightness-0 invert"></div>
                <div class="text-left font-black tracking-widest uppercase text-[16px]">Acesse nosso Site</div>
            </a>
        </div>

        <div class="mt-12 flex flex-col items-center text-acari-dark text-center pb-10">
            <img src="./img/local.png" alt="" class="w-16 h-16 object-contain mb-2">
            <p class="font-bold text-[1rem]">Rua João Silvério de Freitas, 34</p>
            <p class="text-gray-600 text-[0.8rem] font-medium">Nova Itapevi - Itapevi, SP | 06694-020</p>
        </div>

        <div class="relative w-full max-w-[380px] flex justify-center mb-[-40px] z-20">
            <div class="absolute top-10 left-10 w-32 h-32 bg-acari-yellow rounded-full opacity-40 blur-xl animate-pulse"></div>
            <div class="absolute top-5 right-10 w-40 h-40 bg-acari-blue rounded-full opacity-30 blur-xl"></div>
            <img src="./img/alice.png" alt="Melissa" class="w-full h-160 object-contain alice-mask relative z-10">
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
