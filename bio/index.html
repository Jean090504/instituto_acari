<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Links | Instituto Acari</title>
    
    <link rel="icon" href="../img/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'acari-blue': '#2196F3',
                        'acari-green': '#71C144',
                        'acari-red': '#E81C1D',
                        'acari-yellow': '#FDB80A',  
                        'acari-dark': '#000000',
                    },
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bg-acari-fundo {
            background-image: url('./img/fundo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Efeito de corte na imagem da Alice */
        .alice-mask {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
    </style>
</head>
<body class="bg-gray-100 bg-acari-fundo min-h-[100dvh] font-roboto text-acari-dark relative">

    <div class="fixed inset-0 z-0 bg-white/10 pointer-events-none"></div>

    <div id="main-container" class="relative z-10 min-h-screen flex flex-col items-center py-6 px-4">
    

        <div class="w-full max-w-[380px] bg-white rounded-[2.5rem] shadow-2xl text-center border border-white p-6 pt-12 pb-8 z-10">
            
            <div class="relative inline-block mb-4">
                <div class="w-24 h-24 bg-white rounded-full border-2 border-gray-100 shadow-md overflow-hidden flex items-center justify-center">
                    <img src="./img/logo.png" alt="Logo" class="w-full h-full object-contain scale-[1.7] -translate-y-[-2%] translate-x-[4%]">
                </div>
            </div>
            
            <h1 class="text-3xl md:text-4xl font-black text-acari-dark mb-1 tracking-tight">Instituto Acari</h1>
            <p class="text-gray-600 text-xs mb-8 font-medium px-6 leading-tight uppercase tracking-widest">Acolhimento, Cuidado, Amor, Respeito e Inclusão</p>
            
            <div class="flex justify-center gap-4 mb-8">
                <a href="https://www.instagram.com/institutoacari/" class="w-10 h-10 rounded-full bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white flex items-center justify-center text-xl transition-transform hover:scale-110">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://api.whatsapp.com/send?phone=5511994657566" class="w-10 h-10 rounded-full bg-[#25D366] text-white flex items-center justify-center text-xl shadow-md transition-transform hover:scale-110">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="mailto:institutoacari@gmail.com" class="w-10 h-10 rounded-full bg-acari-blue text-white flex items-center justify-center text-lg shadow-md transition-transform hover:scale-110">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLSceYbhG327kyPt8ccPd5X-yBjnlR6fbe6_l6IUhDREpPHwWgg/viewform" target="_blank" 
               class="group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-blue text-white rounded-2xl font-bold shadow-xl transition-all hover:scale-[1.02] active:scale-95">
                <div class="flex justify-center items-center">
                    <img src="./img/inscreva-se.png" alt="" class="w-12 h-12 object-contain brightness-0 invert">
                </div>
                <div class="text-left">
                    <span class="text-[16px] tracking-widest uppercase font-black">inscreva-se</span>
                </div>
            </a>
        </div>

        <div class="w-full max-w-[380px] space-y-4 mt-6 px-2">
            
            <a href="/#loja" target="_blank" 
               class="group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-yellow text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02] active:scale-95 leading-[1.1]">
                <div class="flex justify-center items-center">
                    <img src="./img/loja.png" alt="" class="w-12 h-12 object-contain brightness-0 invert">
                </div>
                <div class="text-left uppercase font-black tracking-widest text-[16px]">
                    Adquira<br>Nossa garrafa
                </div>
            </a>

            <a href="/#amigos" 
               class="group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-green text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02] active:scale-95">
                <div class="flex justify-center items-center">
                    <img src="./img/amigos.png" alt="" class="w-12 h-12 object-contain brightness-0 invert">
                </div>
                <div class="text-left">
                    <div class="text-[16px] tracking-widest uppercase font-black leading-tight">Amigos do Acari</div>
                    <div class="text-[10px] tracking-[0.15em] opacity-90 uppercase font-medium">Saiba como doar</div>
                </div>
            </a>
            
            <a href="https://api.whatsapp.com/send?phone=5511994657566&text=Quero ser voluntário!" target="_blank" 
               class="group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-red text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02] active:scale-95">
                <div class="flex justify-center items-center">
                    <img src="./img/voluntario.png" alt="" class="w-12 h-12 object-contain brightness-0 invert">
                </div>
                <div class="text-left font-black tracking-widest uppercase text-[16px]">
                    Seja um<br>voluntário
                </div>
            </a>

            <a href="/" 
               class="group w-full grid grid-cols-[90px_1fr] h-[80px] items-center bg-acari-blue text-white rounded-2xl font-bold shadow-lg transition-all hover:scale-[1.02] active:scale-95">
                <div class="flex justify-center items-center">
                    <img src="./img/website.png" alt="" class="w-11 h-11 object-contain brightness-0 invert">
                </div>
                <div class="text-left font-black tracking-widest uppercase text-[16px]">
                    Acesse nosso Site
                </div>
            </a>
        </div>

        <div class="mt-12 flex flex-col items-center text-acari-dark text-center pb-10">
            <img src="./img/local.png" alt="" class="w-16 h-16 object-contain mb-2">
            <p class="font-bold text-[1rem]">Rua João Silvério de Freitas, 34</p>
            <p class="text-gray-600 text-[0.8rem] font-medium">Nova Itapevi - Itapevi, SP | 06694-020</p>
        </div>

        <div class="relative w-full max-w-[380px] flex justify-center mb-[-40px] z-20">
            <div class="absolute top-10 left-10 w-32 h-32 bg-acari-yellow rounded-full opacity-40 blur-xl animate-pulse"></div>
            <div class="absolute top-5 right-10 w-40 h-40 bg-acari-blue rounded-full opacity-30 blur-xl"></div>
            
            <img src="./img/alice.png" alt="Melissa" class="w-full h-64 object-contain alice-mask relative z-10">
        </div>

    </div>

</body>
</html>
